# VexoCrm/backend/docker-compose.prod.yml
# Production deployment for EasyPanel or manual VPS.
# EasyPanel handles HTTPS/SSL automatically.
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  api:
    build: .
    container_name: vexo-api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3001"
    ports:
      - "3001:3001"
    healthcheck:
      # Liveness sem banco (ver Dockerfile): DB lento não reinicia o container.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
